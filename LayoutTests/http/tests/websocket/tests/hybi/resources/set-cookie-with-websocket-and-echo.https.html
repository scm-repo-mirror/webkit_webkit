<!DOCTYPE html>
<html>
<head>
    <script src="../../../../../js-test-resources/js-test.js"></script>
    <script src="../../../../cookies/resources/cookie-utilities.js"></script>
    <script>
        shouldBeEqualToString("document.location.host", "127.0.0.1:8443");
        async function createWebSocketAndFinish() {
            debug("<br>Attempting to set first-party cookie 'foo' through cross-origin WebSocket handshake.");
            await shouldNotHaveCookie("foo", true);
            await setCookieUsingWebSocketFromHost("127.0.0.1");
            invalidateCachedCookies();
            shouldThrow("document.cookie");
            await shouldNotHaveCookie("foo");
            invalidateCachedCookies();
            await shouldHaveCookieWithValue("foo", "bar", true);
            window.parent.postMessage("Go", "*");
        }
        createWebSocketAndFinish()
    </script>
</head>
<body>
</body>
</html>
